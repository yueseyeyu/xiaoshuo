<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主题色预览 — 番茄小说 AI 辅助系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B1120;
    color: #E2E8F0;
    font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 40px;
  }
  h1 {
    font-size: 20px; font-weight: 600; margin-bottom: 8px;
    color: #F8FAFC;
  }
  .subtitle {
    font-size: 13px; color: #94A3B8; margin-bottom: 40px;
    line-height: 1.6;
  }
  .subtitle code { background: #1E293B; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
    margin-bottom: 60px;
  }

  /* Card */
  .card {
    background: #111827;
    border: 1px solid #1E293B;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #334155; }

  /* Color bar */
  .color-bar {
    height: 6px;
    width: 100%;
  }

  /* Card body */
  .card-body { padding: 20px; }

  /* Color name row */
  .color-name-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .color-name {
    font-size: 16px; font-weight: 600;
  }
  .color-en {
    font-size: 12px; color: #64748B; font-weight: 400;
  }
  .color-hex {
    margin-left: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: #94A3B8;
    background: #1E293B;
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Preview: Sidebar mini */
  .preview-sidebar {
    background: #0B1120;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .preview-sidebar .nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: #94A3B8;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preview-sidebar .nav.active {
    background: rgba(var(--rgb), 0.12);
    color: var(--accent);
  }
  .preview-sidebar .nav:not(.active):hover {
    background: rgba(255,255,255,0.04);
  }
  .preview-sidebar .nav .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }
  .preview-sidebar .nav.active .dot { opacity: 1; }

  /* Preview: KPI row */
  .preview-kpi {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .preview-kpi-item {
    flex: 1;
    background: #111827;
    border: 1px solid #1E293B;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .preview-kpi-item .label {
    font-size: 10px; color: #64748B; margin-bottom: 4px;
  }
  .preview-kpi-item .value {
    font-family: "JetBrains Mono", monospace;
    font-size: 16px; font-weight: 600;
    color: var(--accent);
  }
  .preview-kpi-item .change {
    font-size: 10px; color: #22c55e; margin-top: 2px;
  }

  /* Preview: Pipeline */
  .preview-pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    background: #0B1120;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .pipe-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pipe-dot.done {
    background: var(--accent);
  }
  .pipe-dot.done::after {
    content: ''; width: 8px; height: 8px;
    border-radius: 50%;
    background: #0B1120;
  }
  .pipe-dot.pending {
    background: #1E293B;
    border: 2px solid #334155;
  }
  .pipe-line {
    height: 2px;
    flex: 1;
    min-width: 12px;
  }
  .pipe-line.done { background: var(--accent); opacity: 0.4; }
  .pipe-line.pending { background: #1E293B; }

  /* Preview: Button */
  .preview-btns {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn-primary {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    cursor: pointer;
    transition: filter 0.15s;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover {
    background: rgba(var(--rgb), 0.08);
  }

  /* Preview: Tags */
  .preview-tags {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid rgba(var(--rgb), 0.25);
    color: var(--accent);
    background: rgba(var(--rgb), 0.06);
  }
  .tag.filled {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Preview: Progress bar */
  .preview-progress {
    margin-top: 12px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .progress-label .name { color: #94A3B8; }
  .progress-label .val { color: var(--accent); font-family: "JetBrains Mono", monospace; }
  .progress-track {
    height: 4px;
    background: #1E293B;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
  }

  /* Mood label */
  .mood {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #64748B;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid #1E293B;
  }
  .mood-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* Section heading */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #CBD5E1;
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid #334155;
  }
</style>
</head>
<body>

<h1>主题色预览</h1>
<p class="subtitle">
  在 midnight 深色主题下，展示 6 款候选品牌色在 UI 组件中的实际效果。<br>
  每张卡片模拟了侧边栏、KPI、管线、按钮、标签、进度条等核心组件。<br>
  当前默认色 <code>#38BDF8</code> 将重命名为"静谧蓝"。
</p>

<!-- ===== 候选 1: 清爽天蓝 ===== -->
<div class="grid" id="colorGrid"></div>

<script>
const candidates = [
  {
    id: 'serene-blue',
    name: '静谧蓝',
    en: 'Serene Blue',
    hex: '#38BDF8',
    rgb: '56,189,248',
    mood: '当前默认色，沉稳静谧，专业感强',
    moodColor: '#38BDF8',
    note: '已有'
  },
  {
    id: 'ocean-teal',
    name: '海洋青',
    en: 'Ocean Teal',
    hex: '#2DD4BF',
    rgb: '45,212,191',
    mood: '清爽通透，偏向青绿，干净利落',
    moodColor: '#2DD4BF',
    note: '新增'
  },
  {
    id: 'arctic-cyan',
    name: '极光青',
    en: 'Arctic Cyan',
    hex: '#22D3EE',
    rgb: '34,211,238',
    mood: '冰蓝清爽，冷调通透，科技感十足',
    moodColor: '#22D3EE',
    note: '新增'
  },
  {
    id: 'lavender-violet',
    name: '薰衣紫',
    en: 'Lavender Violet',
    hex: '#A78BFA',
    rgb: '167,139,250',
    mood: '优雅紫调，柔和高级，偏冷静不浮躁',
    moodColor: '#A78BFA',
    note: '新增'
  },
  {
    id: 'aurora-indigo',
    name: '极光靛',
    en: 'Aurora Indigo',
    hex: '#818CF8',
    rgb: '129,140,248',
    mood: '蓝紫过渡，冷静理性，偏 Linear 风格',
    moodColor: '#818CF8',
    note: '新增'
  },
  {
    id: 'mint-jade',
    name: '薄荷翠',
    en: 'Mint Jade',
    hex: '#34D399',
    rgb: '52,211,153',
    mood: '清爽薄荷绿，活力清新，自然通透',
    moodColor: '#34D399',
    note: '新增'
  }
];

const navItems = ['工作台', '书库', '拆书', '报告', '写作', '日志'];
const kpis = [
  { label: '入库书籍', value: '33', change: '+2 本周' },
  { label: '分析完成', value: '28', change: '85%' },
  { label: '商业评分', value: '4.2', change: '' },
  { label: '管线健康', value: '全通', change: '' },
];

function renderCard(c, idx) {
  const activeNav = idx === 0 ? 0 : Math.min(idx, navItems.length - 1);
  const navHtml = navItems.map((n, i) =>
    `<div class="nav ${i === activeNav ? 'active' : ''}">
      <span class="dot"></span>${n}
    </div>`
  ).join('');

  const kpiHtml = kpis.map(k =>
    `<div class="preview-kpi-item">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
      ${k.change ? `<div class="change">${k.change}</div>` : ''}
    </div>`
  ).join('');

  const totalDots = 6;
  const doneDots = idx < 2 ? 4 : (idx === 2 ? 3 : 5);
  let pipeHtml = '';
  for (let i = 0; i < totalDots; i++) {
    const isDone = i < doneDots;
    pipeHtml += `<div class="pipe-dot ${isDone ? 'done' : 'pending'}"></div>`;
    if (i < totalDots - 1) {
      pipeHtml += `<div class="pipe-line ${isDone ? 'done' : 'pending'}"></div>`;
    }
  }

  const tags = ['末世', '都市', '科幻', '玄幻'];
  const tagsHtml = tags.map((t, i) =>
    `<span class="tag ${i === 0 ? 'filled' : ''}">${t}</span>`
  ).join('');

  return `
    <div class="card" style="--accent: ${c.hex}; --rgb: ${c.rgb};">
      <div class="color-bar" style="background: ${c.hex};"></div>
      <div class="card-body">
        <div class="color-name-row">
          <div class="color-swatch" style="background: ${c.hex};"></div>
          <div>
            <div class="color-name">${c.name}</div>
            <div class="color-en">${c.en}</div>
          </div>
          <div class="color-hex">${c.hex}</div>
        </div>

        <div class="preview-sidebar">${navHtml}</div>

        <div class="preview-kpi">${kpiHtml}</div>

        <div class="preview-pipeline">${pipeHtml}</div>

        <div class="preview-btns">
          <button class="btn-primary">一键全量分析</button>
          <button class="btn-secondary">生成写作指令</button>
        </div>

        <div class="preview-tags">${tagsHtml}</div>

        <div class="preview-progress">
          <div class="progress-label">
            <span class="name">GPU 使用率</span>
            <span class="val">67%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 67%;"></div>
          </div>
        </div>

        <div class="mood">
          <span class="mood-dot" style="background: ${c.moodColor};"></span>
          ${c.mood}
        </div>
      </div>
    </div>
  `;
}

document.getElementById('colorGrid').innerHTML = candidates.map((c, i) => renderCard(c, i)).join('');
</script>

</body>
</html>
