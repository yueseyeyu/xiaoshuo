      玄幻: {练气: 0.8, 斗气: 0.8, 魔法: 0.7, 武魂: 0.7, 玄幻: 0.5, 异界: 0.6, 召唤: 0.6, 魂环: 0.8}
      仙侠: {金丹: 1.0, 元婴: 1.0, 修仙: 0.9, 飞升: 0.8, 渡劫: 0.8, 灵根: 0.7, 飞剑: 0.7, 仙侠: 0.9, 筑基: 0.8, 炼气: 0.7, 剑修: 0.7}
      无限流: {主神: 1.0, 轮回: 0.8, 副本: 0.7, 无限流: 0.9, 穿梭: 0.5, 诸天: 0.5, 位面: 0.5}
      历史: {大明: 1.0, 明朝: 1.0, 崇祯: 1.0, 唐朝: 1.0, 三国: 1.0, 穿越: 0.15, 古代: 0.5, 帝国: 0.5, 皇帝: 0.6, 朝廷: 0.7, 大宋: 1.0, 清朝: 1.0}
      都市: {都市: 0.9, 校花: 0.8, 总裁: 0.8, 重生: 0.15, 系统: 0.1, 上班: 0.7, 公司: 0.6, 现代: 0.6}
      悬疑: {恐怖: 0.8, 诡异: 0.8, 鬼: 0.7, 诅咒: 0.7, 悬疑: 0.9, 推理: 0.8, 凶杀: 0.8, 刑警: 0.7}
      武侠: {武功: 0.8, 内力: 0.9, 江湖: 0.8, 刀法: 0.7, 剑法: 0.7, 武林: 0.9, 轻功: 0.8, 武侠: 0.9}
      洪荒: {盘古: 1.0, 鸿钧: 1.0, 三清: 1.0, 通天: 0.9, 太上: 0.9, 原始: 0.9, 昆仑: 0.8, 洪荒: 0.9, 圣人: 0.7, 封神: 0.8, 准提: 0.9, 接引: 0.9, 女娲: 0.9, 东皇: 0.8, 巫族: 0.8, 妖族: 0.7}
      游戏: {网游: 1.0, 电竞: 0.9, 全息: 0.8, 副本: 0.5, BOSS: 0.6, NPC: 0.6, 等级: 0.3, 任务: 0.2}
      奇幻: {魔法: 1.0, 异世界: 0.9, 龙: 0.5, 精灵: 0.8, 矮人: 0.8, 魔兽: 0.7, 剑与魔法: 0.9}
    # L1: 书名关键词 → 直接题材映射 (优先级高于 L2)
    title_rules:
      "大明": "历史"
      "三国": "历史"
      "唐朝": "历史"
      "大宋": "历史"
