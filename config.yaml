# ============================================================================
# config.yaml — 番茄小说 AI 辅助创作系统 v7.5
#
# ── 文件定位 ──
# 系统唯一配置文件。所有模块的运行时行为由本文件控制。

# ============================================================
# 作者偏好 — 全局注入所有 LLM 调用
# ============================================================
author:
  name: "番茄小说作者"
  genres: ["末世", "科幻"]
  avoid_genres: []
  style_notes: "智斗生存流 + 人外羁绊 + 代价驱动进化 · 月=灾变时代第一个妖，天赋凌驾万物之上"
  current_book: "《末日模拟器》- 5卷300章"
# 采用"渐进式启用"策略：P0 阶段启用的模块默认 true，P1/P2 默认 false。
# 关联文档: DESIGN.md §5.2
#
# ── 路径约定 ──
# 所有模型路径使用绝对路径，指向共享模型库 D:/DaMoXing/
# 所有相对路径相对于项目根目录 d:/Code/xiaoshuo/
#
# ── 修改规则 ──
# · 修改后无需重启系统，各模块在下次调用时重新读取
# · 修改 AI_PROTOCOL.md 后需删除 memory/system_prompt_cache.bin 以触发缓存重建
# · enabled: false 的模块对应的 .py 文件可以不存在（懒加载）
# ============================================================================

# ============================================================
# S0: 模型编排 — 控制哪些模型加载、如何路由
# 模块: model_orchestrator.py
# 决策依据: DESIGN.md §2.3 & §2.4 显存预算
# ============================================================
model_orchestration:

  # single_model = 仅加载主模型（P0-2已确定Qwen3.5为最优单模型方案）
  mode: "single_model"

  # llama-server.exe 路径（共享环境，所有模型共用）
  llama_server_exe: "D:/miniconda3/envs/llm-shared/Library/bin/llama-server.exe"

  models:
    # ── 主模型: S3 评审 + S4 检测 + 概念归纳 ──
    main_model:
      name: "Qwen3.5-9B-Instruct"
      gguf: "D:/DaMoXing/Qwen3.5-9B-IQ4_XS.gguf"
      quant: "IQ4_XS"                    # v8.2: 从 Q4_K_M 切换。ByteShape 基准: 准确率 0.9858 vs Q4_K_M 0.9765, TPS +8.6%, 体积 -0.5GB
      port: 8000                         # llama.cpp server 端口
      n_ctx: 8192                        # 上下文窗口。IQ4_XS 节省 ~0.5GB 显存，可尝试提升至 16384
      n_gpu_layers: 35                   # 全部 35 层 offload 到 GPU
      kv_cache_type_k: "q8_0"           # v7.6: Key 缓存 8-bit（保持精度，影响 MTP 接受率）
      kv_cache_type_v: "q4_0"           # v7.6: Value 缓存 4-bit（节省 ~25% KV 显存，质量影响极小）
      api_key: "xiaoshuo-local-2026"     # v7.5: 本地 API 认证密钥（可选，留空则无认证）
      chat_format: "chatml"              # Qwen 系列用 ChatML 格式
      estimated_vram: "5.5GB"            # v8.2: IQ4_XS 模型 ~5.17GB + KV Cache ~0.3GB

    # ── 网文专家: S1 创意引导 + S2b 参考版 + 节拍分析 ──
    # 基于 Qwen3-4B + TanXS 中文网文 LoRA 微调
    # P0-1 实验验证是否满足 S1 创意质量要求
    # ── 以下模型 v7.3 未启用，保留配置供未来扩展 ──
    webnovel_expert:
      name: "Qwen3-4B-Instruct + WebNovel LoRA"
      gguf: "D:/DaMoXing/Qwen3-4B-Q4_K_M.gguf"
      port: 8001
      n_ctx: 16384                       # 创意任务无需超大上下文
      n_gpu_layers: 24                   # 4B 模型全部 GPU offload
      chat_format: "chatml"
      estimated_vram: "2.8GB"            # 模型 2.5 + KV Cache ~0.3GB
      enabled: false                     # P0-1 实验后决定是否启用

    # ── 逻辑警察候选: R1-0528 推理链蒸馏，幻觉率-50%，交叉审查用 ──
    # v7.5: 已升级至 DeepSeek-R1-0528-Qwen3-8B (AIME 2024 86.0%, 幻觉降低45-50%)
    # 架构与主模型完全不同 (标准Transformer vs GatedDeltaNet)，满足独立审查要求
    logic_cop_candidate:
      name: "DeepSeek-R1-0528-Qwen3-8B"
      gguf: "D:/DaMoXing/DeepSeek-R1-0528-Qwen3-8B-Q4_K_M.gguf"
      port: 8002
      n_ctx: 4096                        # 交叉审查不需要大上下文，节省 KV Cache
      n_gpu_layers: 24                   # 8B 模型全部 GPU offload (24层)
      chat_format: "chatml"              # 与 llama.cpp 兼容
      estimated_vram: "5.9GB"            # Q4_K_M ~5.9GB, 与主模型串行切换
      role: "logic_cop_only"
      enabled: true                      # v7.5: 启用双模型交叉审查

    # ── 无审查模型: 海外成人向角色扮演（v7.7） ──
    # 用于 NSFW/擦边内容生成，与主模型串行切换
    # 推荐: Qwen3.5-9B Abliterated (HauhauCS / Huihui-ai / heretic-org)
    uncensored_model:
      name: "Qwen3.5-9B-Uncensored"
      gguf: "D:/DaMoXing/Qwen3.5-9B-Uncensored-Q4_K_M.gguf"
      port: 8003
      n_ctx: 16384                      # RP场景 16K 足够（角色DNA + 分层记忆 + 对话）
      n_gpu_layers: 35
      kv_cache_type_k: "q8_0"
      kv_cache_type_v: "q4_0"
      chat_format: "chatml"
      estimated_vram: "6.0GB"
      enabled: false                     # 需要时手动启用，与主模型互斥（串行切换）
      note: "HuggingFace: HauhauCS/Qwen3.5-9B-Abliterated 或 Huihui-ai/qwen3.5-9b-abliterated"

    # ── 外部API: DeepSeek 独立评分 + 硅基流动备用 ──
    # v7.5: DS做主评(85%), Qwen fallback(15%), api_key在 secrets.yaml
    external_api:
      deepseek:
        provider: "deepseek"
        enabled: false                  # CodeBuddy 调用前会请求你改为 true
        base_url: "https://api.deepseek.com"
        model: "deepseek-chat"
        max_tokens: 80
        temperature: 0.0
        timeout: 30
      siliconflow:                      # 备用通道（官方高峰期自动切换）
        provider: "siliconflow"
        enabled: false                  # 注册 https://siliconflow.cn 后改 true
        api_key: "sk-PLACEHOLDER"
        model: "deepseek-ai/DeepSeek-V3"
        base_url: "https://api.siliconflow.cn"
        timeout: 30

  # ── 评分混合策略 v7.5 ──
  scoring:
    llm_source_priority: ["deepseek", "qwen"]
    llm_weight: 0.85
    rule_weight: 0.15
    calibration_enabled: true           # OLS线性回归校准 (替代旧-22 offset)
    cache_ttl_days: 7
    llm_text_max_chars: 4000           # 传给 LLM 的最大章节文本长度
    llm_sample_chapters: 5             # 每本采样章节数
    novel_source_dir: "data/raw/novels"  # 原始小说 txt 目录（相对于项目根）
    grades:
      s_plus: 80                       # S+ 神作
      a: 70                            # A 精品
      b: 60                            # B 普通需优化
      c: 50                            # C 扑街风险
      d: 0                             # D 不建议发

  # ── 任务→模型 路由表 ──
  # model_orchestrator.py 根据 task_type 自动选择目标模型
  routing_table:
    S1_creative: "main_model"           # 创意引导→Qwen3.5-9B (thinking=ON 模式)
    S2b_reference: "main_model"         # AI参考版→Qwen3.5-9B
    S3_logic_cop: "main_model"          # 逻辑警察→Qwen3.5-9B (thinking=OFF)
    S3_cross_check: "logic_cop_candidate"  # v7.5: 交叉审查→DeepSeek-R1-0528-8B
    S4_style_check: "main_model"        # 风格检测→Qwen3.5-9B (thinking=OFF)
    S3_editor: "main_model"              # 网文编辑→主模型
    S3_qc: "main_model"                  # 语言质检→主模型
    S4_detection: "main_model"           # 风格检测→主模型
    M5a_beat: "main_model"                # 节拍分析→Qwen3.5-9B
    M5b_drift: "main_model"              # 漂移分析→Qwen3.5-9B

  fallback: "single_model"               # 双模型任一崩溃→自动降级

# ============================================================
# S0: A/B 测试框架 — 标准化模型对比实验
# 模块: model_ab_test.py
# 决策依据: DESIGN.md §2.3.4
# ============================================================
ab_test:
  # 5 个创意 prompt × 3 轮 × 候选模型 = 评分对比
  creative_prompts: ["scene_desc", "dialogue", "action_seq", "psychology", "lore_setup"]
  logic_prompts: ["causal_logic", "timeline_contra"]
  rounds: 3                             # 每个 prompt 重复次数（消除采样方差）
  metrics: ["yules_k", "ai_fingerprint_density", "action_constraint_pass_rate", "tokens_per_sec", "logic_f1"]

# ============================================================
# S0: AI_PROTOCOL.md 协议注入
# 模块: skill_loader.py
# 决策依据: DESIGN.md §7.1 — 静态前缀与动态内容分离，确保 Prefix Cache 命中
# ============================================================
skill:
  path: "AI_PROTOCOL.md"                       # 协议文件位置
  static_prefix_only: true               # 强制 System Prompt 不含动态变量

# ============================================================
# L3: 嵌入 & 检索 — 向量库 + 精排
# 模块: novel_graph.py / narrative_index.py
# 决策依据: BGE-M3 8192 token 上下文 + 100+ 语言；ReRanker 精度 +15-30%
# ============================================================
embedding:
  model: "BAAI/bge-m3"                   # 主嵌入模型（稠密+稀疏混合）
  reranker:
    model: "BAAI/bge-reranker-v2-m3"     # Cross-Encoder 精排模型
    top_k: 3                             # top-20 → top-3 精排
    cpu_fallback: true                   # 显存不足时 CPU 运行（+50-100ms 延迟）
    max_length: 512                      # ReRanker 最大输入长度

# ============================================================
# S0: Prefix Caching — System Prompt KV Cache 磁盘持久化
# 模块: llama.cpp 内置功能
# 决策依据: 首 Token 延迟减少 ~40%
# ============================================================
prefix_caching:
  enabled: true
  cache_file: "memory/system_prompt_cache.bin"
  static_prefix_only: true               # AI_PROTOCOL.md 不含变量 → 缓存 100% 命中
  hit_rate_monitoring: true              # 监控缓存是否静默失效
  hit_rate_alert_threshold: 0.90         # <90% → 检查 AI_PROTOCOL.md 是否有动态变量

# ============================================================
# L3b: SVO 三元组抽取 — 句子级情节因果追踪
# 模块: novel_graph.py
# 灵感: STORYTELLER (ACL 2025 Findings)
# ============================================================
svo_extraction:
  auto_extract: false                    # P1 启用；每章 S2a 后自动抽取
  llm_temperature: 0.1                   # 低温度确保抽取一致性
  max_svos_per_chapter: 50               # 事件密集章节的截断上限

# ============================================================
# L4: 语义记忆层 — 概念归纳（在事实记忆之上）
# 模块: semantic_memory.py
# 灵感: AriGraph (2024)
# ============================================================
semantic_memory:
  enabled: false                         # P1 启用
  update_interval_chapters: 1            # 每章完成后更新概念图
  concept_confidence_threshold: 0.3      # 低于此值=候选概念，需人工确认
  max_concepts: 200                      # 防止概念图无限膨胀
  gold_set_path: "tests/golden_test_set/ground_truth/concepts.json"

# ============================================================
# L1: 叙事结构索引检索
# 模块: narrative_index.py
# 决策依据: "找历史所有'假胜利'节拍的写法" → 叙事功能过滤 + 语义精排
# ============================================================
narrative_index:
  enabled: false                         # P1 启用
  index_dimensions: ["beat", "emotional_arc", "pleasure_pattern", "narrative_function"]
  retrieve_top_k: 3

# ============================================================
# L10: 场景级写作参考检索引擎 (v8.0)
# 模块: scene_search.py
# 用途: 新人作者输入"怎么写拍卖场冲突" → 从33本书中检索最相似场景 + 技法分析
# 决策依据: RAG 在网文创作场景的最佳落地形式 — 写前参考 > 写后分析
# 检索方案: 混合检索 (工业标准) — BM25 (关键词) + BGE (语义) + RRF 融合
#   - BM25 通道: rank_bm25.BM25Okapi + jieba 分词 (词频饱和 + 长度归一化)
#   - BGE 通道:  sentence_transformers + BAAI/bge-small-zh-v1.5 (512维, L2归一化)
#   - RRF 融合:  Reciprocal Rank Fusion, k=60 (Cormack et al. 2009)
#   - 性能: BEIR/MTEB 基准显示 hybrid 比 BM25/BGE 单通道高 5-15% NDCG@10
#   - 模型缓存: .hf_cache/ (已存在, 无需联网下载)
# ============================================================
scene_search:
  enabled: true
  method: "hybrid_bm25_bge"                   # 检索方法: 混合检索 BM25 + BGE + RRF
  embedding_model: "BAAI/bge-small-zh-v1.5"   # 中文优化，512维，CPU可运行
  rrf_k: 60                                    # RRF 平滑参数 (工业标准默认值)
  top_k: 5                                     # 默认返回结果数
  min_scene_chars: 200                         # 场景最小字符数
  max_scene_chars: 1500                        # 场景最大字符数（超出则切分）
  cache_dir: "data/processed/{genre}/scene_index/"  # 缓存目录模板

# ============================================================
# L9: 叙事节拍分析器 + 节奏曲线
# 模块: beat_analyzer.py / rhythm_curve.py / pleasure_density.py
# 决策依据: 4 套叙事理论按类型自动匹配；节奏曲线 P1 启用
# ============================================================
beat_analyzer:
  auto_analyze_every_n_chapters: 10      # 每 10 章自动生成节拍报告
  frameworks:
    - "save_the_cat"                     # 升级流、传统长篇
    - "heros_journey"                    # 玄幻、异世界
    - "kishotenketsu"                    # 中式章回体、都市情感
    - "webnovel_golden"                  # 系统流、签到流
  auto_match_by_genre: true              # 根据小说类型自动匹配框架
  rhythm_curve: false                    # P1 启用四阶段张力模型
  rhythm_model: "four_phase"             # buildup→delay→peak→afterglow

# ============================================================
# L9: 风格漂移监控 + 风格噪声注入
# 模块: style_drift_monitor.py / style_noise_injector.py
# 决策依据: MASH (ACL 2026) — 反其道行之，在人类文本中强化作者指纹
# ============================================================
style_drift:
  monitor_window: 10                     # 滑动窗口：对比最近 10 章
  warning_threshold: 0.3                 # 漂移幅度 >0.3 → WARNING
  style_noise_injection: false           # P2 启用；density*1.1 微调标点/罕见词
  noise_intensity: "adaptive"            # 根据漂移程度动态调整注入强度

# ============================================================
# S2b: 污染链切断 — 防止 AI 建议限定作者认知框架
# 决策依据: DESIGN.md §6.2 — 3方向随机 + 模糊化 + 认知距离
# ============================================================
s2b:
  show_raw_text: false                   # 绝对不展示 AI 生成的原文
  show_structural_analysis: true         # 仅展示结构化分析
  direction_count: 3                     # 给出 3 个不同方向的建议
  fuzzification_level: "medium"          # low|medium|high — 模糊化程度
  cognitive_distance_bias: 0.7           # 偏向推荐最远认知距离的方向（概率 70%）
  unlock_min_segments: 3                 # 手写 ≥3 段后才能解锁 S2b
  unlock_min_chars: 500                  # 手写 ≥500 字后才能解锁 S2b

# ============================================================
# L5: S4+++ 七层检测引擎
# 模块: s4_plus_plus.py
# 决策依据: DESIGN.md §4.5 — 加权判定 + 七层互补
# 提示: Layer 7 (N-gram PPL) 权重最高 (×3)，源自 IEEE 2024 论文
# ============================================================
detection:
  layers:
    l1_ppl:
      enabled: true
      safe_threshold: 50                 # PPL > 50 = 人类风格
      warn_threshold: 40                 # 40-50 = 警告区间
    l2_burstiness:
      enabled: true
      safe_threshold: 0.6                # stdev(句长)/mean(句长) > 0.6
    l3_ai_word_cooccurrence:
      enabled: true
      window_size: 100                   # 100词滑动窗口
      max_ai_words: 2                    # 窗口内AI指纹词 ≤ 2
    l4_sentence_length_variation:
      enabled: true
      warning_threshold: 0.20            # v1→v2 句长变异系数下降>20% = 警告
    l5_syntax_variation:
      enabled: true
      safe_threshold: 0.30               # 句法模式重复率 < 30%
      fatal_threshold: 0.40              # > 40% = 致命
    l6_semantic_continuity:
      enabled: true
      safe_threshold: 0.7                # 相邻句语义连贯度 > 0.7
    l7_ngram_ppl:
      enabled: true
      fatal_threshold_ratio: 0.6         # N-gram PPL < 基线均值×0.6 = 过于可预测

    # v7.6: 代码层 L5/L6 专用配置 (style_detection_loop.py)
    l5_character_consistency:
      enabled: true
      max_rare_names: 3                   # 低频异常角色名 ≤ 3
      max_similar_pairs: 2                # 相似名变体对 ≤ 2
    l6_ai_tic_phrases:
      enabled: true
      max_density: 1.0                    # AI口头禅密度 ≤ 1.0/千字
      max_unique: 8                       # 独特口头禅种类 ≤ 8

    # v7.7: L7 人味度检测 (第一人称+心理总结去AI味)
    l7_human_likeness:
      enabled: true
      min_score: 40                       # 人味度 < 40 = FAIL
      min_psych_density: 0.5              # 心理活动密度 ≥ 0.5/千字
      max_omniscient_leaks: 2             # 上帝视角泄露 ≤ 2

  # S3_qc 专用：AI 指纹词密度（每万字计数，与 l3 窗口法互补）
    ai_word_density:
      enabled: true
      safe_threshold: 15                   # < 15 / 10000 字 = 正常
      warn_threshold: 30                   # 15-30 = 警告，> 30 = 严重
    # S3_qc 专用：风格漂移基线（与顶层 style_drift.monitor 互补）
    style_drift_detection:
      enabled: true
      sentence_length_warn: 0.30           # 句长偏离基线 ±30% = 警告
      vocab_warn: 0.20                     # 前100高频词 20% 不在基线 = 漂移
      emotion_warn: 0.50                   # 情感密度偏离基线 ±50% = 显著漂移

  # 加权判定：Layer 7(N-gram PPL) 区分信号最强，权重最高
  weights: {l7: 3, l2: 2, l3: 2, l1: 1}

  # 作者声音基线：12维核心指纹（P0 降维，5章样本稳定）
  voice_baseline:
    dimensions: 12
    min_chapters: 5                      # 最少 5 章手写样本 → 建立基线
    similarity_threshold: 0.7            # 相似度 < 0.7 = 风格突变
    drift_warning: 0.3                   # 漂移幅度 > 0.3 = 风格漂移告警

# ============================================================
# L8: 安全 & 合规
# 模块: action_constraint.py / mash_pipeline.py / behavior_camouflage.py
# ============================================================
safety:
  action_constraint:
    enabled: true                        # 代码级硬拦截，双重保障
    max_direct_quote_chars: 30           # AI 输出连续文字 >30 字符 → 截断
    check_paragraph_boundary: true       # 检测是否有完整的"段落感"

  mash_pipeline:
    enabled: false                       # P2: SFT→DPO→推理精炼四阶段

  adversarial_paraphrasing:
    enabled: false                       # P1: ICLR 2025 免训练对抗改写快速原型

  behavior_camouflage:
    word_count_jitter: [-200, 300]       # 发布时字数随机浮动（仅保留此项）

  realtime_linting:
    enabled: false                       # P2: Obsidian/VS Code 实时检测插件
    plugin_type: "obsidian"
    check_layers: [2, 3]                 # L2 突发性 + L3 AI词共现

# ============================================================
# L10: 评估体系
# 模块: pan2026_evaluator.py / model_ab_test.py / regression_suite.py
# ============================================================
golden_test_set:
  path: "tests/golden_test_set/"
  auto_run_on_change: false             # P1: 代码修改后自动跑回归测试

pan2026:
  enabled: false                         # P1: PAN 2026 外部基准集成
  tasks: ["voight_kampff", "multi_author_style"]

langfuse:
  enabled: false                         # P1: LLM 调用可观测性追踪
  self_hosted: true                      # Docker 自托管，零外部依赖
  port: 3000

# ============================================================
# 系统熔断 — 防止异常循环消耗
# 模块: state_machine.py / model_orchestrator.py
# ============================================================
circuit_breaker:
  max_s3_retries_per_chapter: 2          # 同一章 S3 退回 S2d 重写最多 2 次
  max_daily_llm_calls: 50                # 每日 LLM 调用上限（防止 prompt 循环 bug）
  vram_pressure_threshold: 0.90          # 显存使用率 >90% → 降级/告警

# ============================================================
# 分析管线 — 书籍品质过滤 & 节奏/商业分析阈值
# 模块: book_processor.py / quality_gate.py / rhythm_analyzer.py / genre_synthesizer.py
# ============================================================
analysis:
  # ── 入库基础过滤 (book_processor.py) ──
  book_filter:
    min_size_kb: 200                     # 最小文件大小 (KB)，低于此值 → books/review/
    min_chapters: 5                      # 开头10000字内最少章节数
    min_chinese_density: 0.40            # 中文字符最低密度 (<0.4 → 可能是乱码/非正文)
    known_quality_list:                  # 精品书单 (作者人工确认 + Marvis正文验证)
      - "末日拼图游戏"
      - "我在末世有套房"
      - "全球进化"
      - "异兽迷城"
      - "第九特区"
      - "世界末日从考试不及格开始"
      - "十日终焉"
      - "废土崛起"
      - "从红月开始"
      - "黑暗文明"
      - "狩魔手记"
      - "恐慌沸腾"
      - "末日蟑螂"
      - "限制级末日症候"
      - "灾厄纪元"
      - "黑暗血时代"
      - "末世大回炉"
      # P0: 本次审计新增精品
      - "地球游戏场"
      - "重卡战车在末世"
      - "末世超级商人"
      - "我的女友是丧尸"
      - "末世召唤狂潮"
      - "黑暗王者"
      - "神秘尽头"
      - "超级神基因"
      - "末世：从加点开始无限进化"
    # 已知精品的预设 genre（跳过关键词自动检测，防误分类）
    known_genre_map:
      "异兽迷城": "末世"
      "世界末日从考试不及格开始": "末世"
      # P0: Marvis审查补充
      "十日终焉": "无限流"
      "超级神基因": "科幻"
      "狩魔手记": "末世"
      "恐慌沸腾": "末世"
      "黑暗文明": "末世"
      "末日蟑螂": "末世"
      "限制级末日症候": "末世"
      # P0: 9本新书审计 (Marvis正文验证)
      "从红月开始": "末世"
      "灾厄纪元": "末世"
      "黑暗末日": "末世"
      "末世大回炉": "末世"
      "我的末世领地": "末世"
      "穹顶之上": "科幻"
      # P0: 最终9本审计 (Marvis正文验证)
      "深渊之主": "奇幻"
      "地球游戏场": "末世"
      "全球变异，从灾厄降临开始": "末世"
      "我的女友是丧尸": "末世"
      "末世之深渊召唤师": "末世"
      "末世召唤狂潮": "末世"
      "末世魔神游戏": "末世"
      "重卡战车在末世": "末世"
      "末世超级商人": "末世"
      "黑暗王者": "末世"
      "神秘尽头": "末世"
      "蹉跎": "末世"
    # 🆕 作者豁免列表: 这些书跳过所有自动 FAIL/QUARANTINE
    # 工具的角色是辅助筛选，不是自动裁判；作者有权保护自己的参考书
    author_protected_books: []

    # ── 题材检测规则 (v7.5: 从 book_processor.py 迁移至 SSOT) ──
    # L2: 加权关键词 (weight=P(genre|keyword))
    genre_keywords:
      末世: {丧尸: 1.0, 末日: 0.9, 废土: 0.8, 灾变: 0.7, 异兽: 0.5, 兽潮: 0.5, 变异: 0.4, 生存: 0.2, 进化: 0.1, 觉醒: 0.15, 末世: 0.9}
      科幻: {星舰: 1.0, 外星: 0.9, 银河: 0.8, 人工智能: 0.8, 太空: 0.7, 科幻: 0.9, 星际: 0.8, 飞船: 0.5, 光速: 0.4}
      玄幻: {练气: 0.8, 斗气: 0.8, 魔法: 0.7, 武魂: 0.7, 玄幻: 0.5, 异界: 0.6, 召唤: 0.6, 魂环: 0.8}
      仙侠: {金丹: 1.0, 元婴: 1.0, 修仙: 0.9, 飞升: 0.8, 渡劫: 0.8, 灵根: 0.7, 飞剑: 0.7, 仙侠: 0.9, 筑基: 0.8, 炼气: 0.7, 剑修: 0.7}
      无限流: {主神: 1.0, 轮回: 0.8, 副本: 0.7, 无限流: 0.9, 穿梭: 0.5, 诸天: 0.5, 位面: 0.5}
      历史: {大明: 1.0, 明朝: 1.0, 崇祯: 1.0, 唐朝: 1.0, 三国: 1.0, 穿越: 0.15, 古代: 0.5, 帝国: 0.5, 皇帝: 0.6, 朝廷: 0.7, 大宋: 1.0, 清朝: 1.0}
      都市: {都市: 0.9, 校花: 0.8, 总裁: 0.8, 重生: 0.15, 系统: 0.1, 上班: 0.7, 公司: 0.6, 现代: 0.6}
      悬疑: {恐怖: 0.8, 诡异: 0.8, 鬼: 0.7, 诅咒: 0.7, 悬疑: 0.9, 推理: 0.8, 凶杀: 0.8, 刑警: 0.7}
      武侠: {武功: 0.8, 内力: 0.9, 江湖: 0.8, 刀法: 0.7, 剑法: 0.7, 武林: 0.9, 轻功: 0.8, 武侠: 0.9}
      洪荒: {盘古: 1.0, 鸿钧: 1.0, 三清: 1.0, 通天: 0.9, 太上: 0.9, 原始: 0.9, 昆仑: 0.8, 洪荒: 0.9, 圣人: 0.7, 封神: 0.8, 准提: 0.9, 接引: 0.9, 女娲: 0.9, 东皇: 0.8, 巫族: 0.8, 妖族: 0.7}
      游戏: {网游: 1.0, 电竞: 0.9, 全息: 0.8, 副本: 0.5, BOSS: 0.6, NPC: 0.6, 等级: 0.3, 任务: 0.2}
      奇幻: {魔法: 1.0, 异世界: 0.9, 龙: 0.5, 精灵: 0.8, 矮人: 0.8, 魔兽: 0.7, 剑与魔法: 0.9}
    # L1: 书名关键词 → 直接题材映射 (优先级高于 L2)
    title_rules:
      "大明": "历史"
      "三国": "历史"
      "唐朝": "历史"
      "大宋": "历史"
      "明朝": "历史"
      "清朝": "历史"
      "崇祯": "历史"
      "穿越到古代": "历史"
      "电影世界": "无限流"
      "位面": "无限流"
      "诸天": "无限流"
      "末世": "末世"
      "末日": "末世"
      "废土": "末世"
      "修仙": "仙侠"
      "飞升": "仙侠"
      "仙侠": "仙侠"
      "星际": "科幻"
      "星舰": "科幻"
      "赛博": "科幻"
      "机甲": "科幻"
      "银河": "科幻"
      "武侠": "武侠"
      "武林": "武侠"
      "网游": "游戏"
      "电竞": "游戏"
      "全息游戏": "游戏"
      "魔法": "奇幻"
      "异世界": "奇幻"
      "无限": "无限流"
      "轮回": "无限流"
      "南宋": "历史"
      "北宋": "历史"
      "春秋": "历史"
      "楚汉": "历史"
      "洪荒": "洪荒"
      "玩家": "无限流"
      "诡异": "悬疑"
      "终焉": "无限流"
      "星空": "科幻"
    genre_min_score: 2.0                   # L2 加权分数低于此值 → 未知
    min_confidence: 0.40                   # 置信度低于此值 → 低置信度标记

  # ── 分析后品质关卡 v2 (quality_gate.py) ──
  quality_gate:
    min_rhythm_chapters: 10              # Gate A: 最少章节数 (<10→FAIL)
    max_zero_hook_streak: 5              # Gate B: 零钩子上限 (>5→QUARANTINE)
    min_commercial_score: 70             # v7.5: Gate B 商业评分下限 (70=动态阈值 P50-10, 非精品应低于此)
    auto_demote: true                    # FAIL 自动移回 books/review/
    quarantine_days: 7                   # QUARANTINE 天数(无人工→自动FAIL)
    # known_quality_list: 从 book_filter 继承, 已知精品永不 FAIL
    # author_protected_books: 从 book_filter 继承, 作者豁免永不 FAIL/QUARANTINE

  # ── 商业评分等级线 (genre_synthesizer.py) ──
  commercial_grades:
    high: 70                             # ≥70: 高概率签约
    medium: 50                           # ≥50: 签约可期
    low: 30                              # ≥30: 需优化 (<30: 风险偏高)

  # ── 商业评分决策阈值 v7.6 (借鉴"邪修"500订量化标准) ──
  # 综合评分 → 可执行建议，用于 commercial_engine.py
  decision_thresholds:
    hit_potential: 75                    # ≥75: 爆款潜力 — 500订标准达成，全力投入
    worth_investing: 60                  # ≥60: 值得投入 — 可写长篇，但需持续监控
    keep_observing: 40                   # ≥40: 继续观察 — 有潜力但需优化，调整大纲后重测
    # <40: 建议切书 — 综合评分过低，建议放弃当前方向

  # ── 章节分区权重 v7.6 (借鉴"邪修"前50章重点分析) ──
  # 用于 commercial_engine.py 和 beat_detector.py 的分区加权
  chapter_zone_weights:
    front_50: 2.0                        # 前50章权重×2（决定签约/留存/推荐）
    middle: 1.0                          # 中间章节标准权重
    ending: 1.5                          # 结尾权重×1.5（决定完读率）
    front_50_boundary: 50                # 前50章边界
    ending_boundary_pct: 0.85            # 结尾起始百分比（最后15%为结尾区域）

  # ── LLM 端口 (rhythm_analyzer.py llm_verify) ──
  llm_port: 8000                        # 从 model_orchestration.models.main_model.port 同步
  llm_parallel: 2                       # LLM评分并行worker数 (匹配 start_model.bat --parallel)

  # ── 评分验证 (score_validator.py, P1启用) ──
  validation:
    enabled: false                       # P1: 穷举搜索验证方案(2026-06-10)确认后启用
    test_set_dir: "data/processed/{genre}/validation/"
    quality_levels: ["excellent", "good", "mediocre", "below_average", "poor"]
    ground_truth_source: "author_handwritten"  # author_handwritten | ai_adversarial | mixed
    human_annotated_count: 10            # 人类标注章节数
    adversarial_count: 5                 # AI对抗样本数
    generation_model_port: 8001          # 独立端口，不与评分共用模型(防循环自评)
    min_spearman_for_pass: 0.7           # Spearman r >= 0.7 → 评分验证通过

# ============================================================
# 合同链 — 合同种子→运行时合同→章节提交→事件审计
# 模块: contract_chain.py → writing_instructions.py ⓪步
# 灵感: webnovel-writer Story System (lingfengQAQ, v5.4.2)
# ============================================================
contract_chain:
  enabled: true
  canon_dir: "assets/canon"              # 合同种子来源 (characters/rules/world/timeline)
  contracts_dir: "data/contracts"        # 运行时合同 + 债务看板存储
  debt_board:
    max_debts: 200                       # 债务上限 (超出后归档旧已兑现项)
    overdue_gap: 10                      # 逾期阈值: >N章未兑现 → 标记逾期
    severity_weights:                    # 债务严重度在审计中的权重
      CRITICAL: 5
      HIGH: 3
      MED: 1
      LOW: 0
  pre_write_checklist: true              # 写前生成运行时合同 (需 canon/ 已填入)
  post_write_audit: true                 # 写后自动审计 + 注册新债务
  batch_retrospective: true              # 对已有 rhythm CSV 做反向债务分析

# ============================================================
# 创作指导文档生成 (creative_bridge.py)
# ============================================================
creative_bridge:
  # 进度基准关键节点过滤 (只展示这些百分位)
  pct_benchmark_keys: [0, 30, 50, 80, 100]
  # 钩子/爽点密度建议阈值
  hook_per_chars: 500                   # "每N字1个钩子" 平台建议
  pleasure_per_chars: 300               # "每N字1个爽点" 平台建议
  # LLM 基础温度
  llm_temperature: 0.1

# ============================================================
# 结构层对比引擎 (structure_comparator.py)
# ============================================================
structure_comparator:
  # 评分→差距等级映射
  score_gap_thresholds:
    small: 90                            # ≥90: 差距小
    medium: 70                           # ≥70: 差距中 (<70: 差距大)
  # 文件输入限制
  max_input_bytes: 5242880              # 5MB (约100万中文字)
  # 势力数估算下限
  elite_factions_floor: 3               # 启发式估算的最少势力数

# ============================================================
# 硬件守护 (hardware_guardian.py)
# 为长时拆书任务提供 GPU 温度/显存/风扇监控
# ============================================================
hardware_guard:
  enabled: true                         # 是否启用硬件守护
  poll_interval: 5                      # 轮询间隔 (秒)
  # 温度阈值
  temp_warn: 82                         # 警告温度 (°C)
  temp_stop: 87                         # 紧急停止温度 (°C)
  # 风扇
  fan_min_percent: 5                    # 风扇最低转速百分比
  # 显存三级熔断 (MB)
  vram_yellow: 6000                     # >= 此值: 黄色预警
  vram_orange: 6800                     # >= 此值: 橙色预警
  vram_red: 8000                        # >= 此值: 红色预警 (紧急停止，为模型基线预留 ~6GB)
  # 显存泄漏检测
  vram_leak_threshold: 300              # 1小时内累积增长上限 (MB)
  vram_leak_interval: 3600              # 基线漂移检测间隔 (秒)
  leak_history_max: 500                 # 历史记录最大条数

# ============================================================================
# 前端原型服务器配置
# v8.x 整合：原型静态文件由 FastAPI 在 api_server.port 端口统一挂载 (config.yaml::api_server.port)
# 旧 prototype/server.py 已废弃，仅保留前端配置字段供后端 /api/config 透传
# ============================================================================
prototype:
  # port 已删除 (历史残留，与 api_server.port=8089 冲突)
  genre: "末世"                           # 默认服务题材，对应 data/reports/{genre}
  data_dir: "data/reports"               # 报告数据根目录（相对项目根）
  auto_open_browser: false               # 启动时是否自动打开浏览器
  # v7.17: 主题品牌色预设（强调色循环）
  # 保留 minimax 修改前默认天蓝 + 方案 C 番茄红
  theme_presets:
    - id: sky
      name: "天蓝"
      accent: "#38BDF8"
      accent_rgb: "56,189,248"
    - id: tomato
      name: "番茄"
      accent: "#D97706"
      accent_rgb: "217,119,6"

# ============================================================================
# v8.1: 平台合规预检 — AI 指纹词检测与 AI 率预估
# 模块: agents/cross_review.py (estimate_ai_rate, scan_fingerprints)
# 参考: 番茄小说"评估期"机制 — 前 10 章 AI 查重 + 20 万字书测触发
# ============================================================================
compliance:
  # AI 率阈值 (对标番茄 30% 红线)
  ai_rate_threshold: 0.30                # 30% 红线，超过则阻断
  ai_rate_warning: 0.20                  # 20% 警告线
  ai_rate_safe: 0.10                     # 10% 安全线

  # 指纹词密度 → AI 率映射系数
  # 公式: ai_rate = min(1.0, fingerprint_count / (text_length * coeff))
  # 每 100 字 1 个指纹词 ≈ 10% AI 率 (经验估算)
  fingerprint_density_coeff: 0.01

# ============================================================================
# v7.7: NSFW 角色扮演 — 海外成人向角色扮演/微世界配置
# 模块: pipeline/canon/rp_simulator.py (LayeredMemory + RPSimulator)
# ============================================================================
nsfw_roleplay:
  enabled: false                         # 需要时启用，与主模型串行切换
  model: "uncensored_model"              # 引用 model_orchestration.models.uncensored_model

  # 分层记忆配置（适配 8GB 显存）
  layered_memory:
    max_summaries: 3                     # 摘要层：最多保留 N 个场景摘要
    max_raw_rounds: 3                    # 原始层：最多保留 N 轮对话
    estimated_tokens: 6000               # 三层总常驻 tokens 估算（核心3K + 摘要2K + 原始1K）

  # 角色 DNA 蒸馏
  character_dna:
    source_dirs:                        # 原料来源：成人小说 + 角色卡
      - "books/in/"
      - "assets/characters/"
    output_dir: "assets/characters/dna/"  # 蒸馏后的角色 DNA JSON 输出目录
    auto_extract: false                  # 是否自动从小说提取角色 DNA

  # 一致性审计（官方版定期检查 Uncensored 版输出质量）
  audit:
    enabled: false
    interval_rounds: 50                  # 每 N 轮对话审计一次
    trigger_on_complaint: true           # 用户投诉时立即触发审计
    auditor_model: "main_model"          # 用官方版做审计

  # 合规
  compliance:
    age_verification: true               # 海外版需年龄验证
    content_rating: "18+"                # 内容分级
    blocked_keywords: []                 # 法律红线关键词（如未成年人相关）

# ============================================================================
# v8.0: API server 配置（SSOT）
# 模块: src/xiaoshuo/api/server.py
# 说明: FastAPI 单服务同时提供 API 与 prototype/ 静态文件，前端同源部署。
# ============================================================================
api_server:
  host: "127.0.0.1"
  port: 8089                           # 后端服务端口；CLI --port 可覆盖
  static_dir: "prototype"              # 前端静态文件目录（相对项目根）
  static_mount: "/"                    # 静态文件挂载路径
  cors:
    allow_origins:                     # 同源部署时仍保留，防止直接跨站调用 API
      - "http://localhost:8089"
      - "http://127.0.0.1:8089"
    allow_methods: ["GET", "POST", "OPTIONS"]
    allow_headers: ["*"]
