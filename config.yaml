      "星空": "科幻"
    genre_min_score: 2.0                   # L2 加权分数低于此值 → 未知
    min_confidence: 0.40                   # 置信度低于此值 → 低置信度标记

  # ── 分析后品质关卡 v2 (quality_gate.py) ──
  quality_gate:
    min_rhythm_chapters: 10              # Gate A: 最少章节数 (<10→FAIL)
    max_zero_hook_streak: 5              # Gate B: 零钩子上限 (>5→QUARANTINE)
    min_commercial_score: 70             # v7.5: Gate B 商业评分下限 (70=动态阈值 P50-10, 非精品应低于此)
    auto_demote: true                    # FAIL 自动移回 books/review/
    quarantine_days: 7                   # QUARANTINE 天数(无人工→自动FAIL)
    # known_quality_list: 从 book_filter 继承, 已知精品永不 FAIL
    # author_protected_books: 从 book_filter 继承, 作者豁免永不 FAIL/QUARANTINE

  # ── 商业评分等级线 (genre_synthesizer.py) ──
  commercial_grades:
    high: 70                             # ≥70: 高概率签约
    medium: 50                           # ≥50: 签约可期
    low: 30                              # ≥30: 需优化 (<30: 风险偏高)

  # ── LLM 端口 (rhythm_analyzer.py llm_verify) ──
  llm_port: 8000                        # 从 model_orchestration.models.main_model.port 同步
  llm_parallel: 2                       # LLM评分并行worker数 (匹配 start_model.bat --parallel)

  # ── 评分验证 (score_validator.py, P1启用) ──
  validation:
    enabled: false                       # P1: 穷举搜索验证方案(2026-06-10)确认后启用
    test_set_dir: "data/processed/{genre}/validation/"
    quality_levels: ["excellent", "good", "mediocre", "below_average", "poor"]
    ground_truth_source: "author_handwritten"  # author_handwritten | ai_adversarial | mixed
    human_annotated_count: 10            # 人类标注章节数
    adversarial_count: 5                 # AI对抗样本数
    generation_model_port: 8001          # 独立端口，不与评分共用模型(防循环自评)
    min_spearman_for_pass: 0.7           # Spearman r >= 0.7 → 评分验证通过

# ============================================================
# 合同链 — 合同种子→运行时合同→章节提交→事件审计
# 模块: contract_chain.py → writing_instructions.py ⓪步
# 灵感: webnovel-writer Story System (lingfengQAQ, v5.4.2)
# ============================================================
contract_chain:
  enabled: true
  canon_dir: "assets/canon"              # 合同种子来源 (characters/rules/world/timeline)
  contracts_dir: "data/contracts"        # 运行时合同 + 债务看板存储
  debt_board:
    max_debts: 200                       # 债务上限 (超出后归档旧已兑现项)
    overdue_gap: 10                      # 逾期阈值: >N章未兑现 → 标记逾期
    severity_weights:                    # 债务严重度在审计中的权重
      CRITICAL: 5
      HIGH: 3
      MED: 1
      LOW: 0
  pre_write_checklist: true              # 写前生成运行时合同 (需 canon/ 已填入)
  post_write_audit: true                 # 写后自动审计 + 注册新债务
  batch_retrospective: true              # 对已有 rhythm CSV 做反向债务分析

# ============================================================
# 创作指导文档生成 (creative_bridge.py)
# ============================================================
creative_bridge:
  # 进度基准关键节点过滤 (只展示这些百分位)
  pct_benchmark_keys: [0, 30, 50, 80, 100]
  # 钩子/爽点密度建议阈值
  hook_per_chars: 500                   # "每N字1个钩子" 平台建议
  pleasure_per_chars: 300               # "每N字1个爽点" 平台建议
  # LLM 基础温度
  llm_temperature: 0.1

# ============================================================
# 结构层对比引擎 (structure_comparator.py)
# ============================================================
structure_comparator:
  # 评分→差距等级映射
  score_gap_thresholds:
    small: 90                            # ≥90: 差距小
    medium: 70                           # ≥70: 差距中 (<70: 差距大)
  # 文件输入限制
  max_input_bytes: 5242880              # 5MB (约100万中文字)
  # 势力数估算下限
  elite_factions_floor: 3               # 启发式估算的最少势力数

# ============================================================
# 硬件守护 (hardware_guardian.py)
# 为长时拆书任务提供 GPU 温度/显存/风扇监控
# ============================================================
hardware_guard:
  enabled: true                         # 是否启用硬件守护
  poll_interval: 5                      # 轮询间隔 (秒)
  # 温度阈值
  temp_warn: 82                         # 警告温度 (°C)
  temp_stop: 87                         # 紧急停止温度 (°C)
  # 风扇
  fan_min_percent: 5                    # 风扇最低转速百分比
  # 显存三级熔断 (MB)
  vram_yellow: 6000                     # >= 此值: 黄色预警
  vram_orange: 6800                     # >= 此值: 橙色预警
  vram_red: 7400                        # >= 此值: 红色预警 (紧急停止)
  # 显存泄漏检测
  vram_leak_threshold: 300              # 1小时内累积增长上限 (MB)
  vram_leak_interval: 3600              # 基线漂移检测间隔 (秒)
  leak_history_max: 500                 # 历史记录最大条数
